<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Limbo Souls</title>
        <meta charset="utf-8">
        <meta name="description"  content="Projeto do primeiro bimestre">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="IMG/logobarra.png">
        <link rel="stylesheet" href="css/style.css">

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        
    </head>
    <body>
        <div class="conteudo-sensivel"></div>
        <header>
            <a href="index.html" title="Home">
                <img src="IMG/LogoP.png" alt="home" title="Home" width="13%">
            </a>

            <nav>
                <a href="index.html" title="Home">HOME</a>
                <a href="midia.html" title="PERSONA">MIDIA</a>
                <a href="persona.html" title="PERSONA">PERSONA</a>
                <a href="inspiration.html" title="LOGIN">INSPIRATIONS</a>
            </nav>
        </header>
        <div class="jogar">
            <img src="IMG/LogoG.png" class="logo" alt="logo">
               <p class="historia">
                Banido para as profundezas do Limbo e despojado de seu passado, você desperta em um reino esquecido. <span class="destaque"> você será capaz</span> de <span class="destaque">desvendar enigmas</span>,<span class="destaque">enfrentar</span> guardiões implacáveis enquanto recupera sua essência?
                </p>
            <button id="btn-play" onclick="verificarAcesso()">
            <p class="btn">play</p>
            </button>
        </div>
        </div>
        <script>
        function verificarAcesso() {
        let nome = prompt("Qual o seu nome?");
        let idade = parseInt(prompt("Qual a sua idade?"));

        if (idade >= 18) {
        alert("Bem-vindo, " + nome + "!");
        window.open("jogo/index.html", "_blank");
        } else {
        alert("Acesso Negado: Você precisa ter 18 anos ou mais para jogar.");
        // Aplica o blur diretamente no botão
        document.getElementById("btn-play").style.filter = "blur(10px)";
        // Opcional: desativa o botão para não clicar de novo
        document.getElementById("btn-play").disabled = true;
        }
        }
    window.onload = function() {
        const ANO_LANCAMENTO = 2026; // Defina aqui o ano do jogo
        const anoAtual = new Date().getFullYear(); // Obtém o ano atual do sistema

        if (anoAtual === ANO_LANCAMENTO) {
            alert("ATENÇÃO!!! ESSE É O GRANDE LANÇAMENTO DO ANO");
        }
    }

</script>
    </body>
</html>
